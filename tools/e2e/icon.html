<!DOCTYPE html><html><head><style>body{margin:0;background:transparent}</style></head><body>
<svg id="ic" width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c1c2e"/>
      <stop offset="1" stop-color="#0a0a16"/>
    </linearGradient>
    <linearGradient id="mk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3ff2c6"/>
      <stop offset="1" stop-color="#00b7a0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="4" y="4" width="88" height="88" rx="22" fill="url(#bg)"/>
  <rect x="4.75" y="4.75" width="86.5" height="86.5" rx="21.4" fill="none" stroke="#3a3a52" stroke-width="1.5"/>
  <!-- V 마크: 두 획의 브이 + 렌즈 조리개 느낌 -->
  <g filter="url(#glow)">
    <path d="M 26 30 L 48 68 L 70 30" fill="none" stroke="url(#mk)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 38 30 L 48 47 L 58 30" fill="none" stroke="#ffffff" stroke-opacity="0.92" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
</body></html>
